name: runtime-triggered nmdc-schema update

on:
  schedule:
    - cron: '0 7 * * *' # daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-nmdc-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch NMDC runtime schema version
        id: runtime
        run: |
          RUNTIME_VERSION=$(curl -sf https://api.microbiomedata.org/version \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['nmdc-schema'])")
          echo "runtime=${RUNTIME_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Runtime: ${RUNTIME_VERSION}"

      - name: Read current requirements entry
        id: current
        run: |
          CURRENT_VERSION=$(grep -E '^nmdc-schema' requirements.txt | sed -E 's/^nmdc-schema==([^[:space:]#]+).*/\1/' || true)
          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Current line: ${CURRENT_VERSION}"

      - name: Create PR if runtime changed
        id: changes
        env:
          RUNTIME: ${{ steps.runtime.outputs.runtime }}
          CURRENT: ${{ steps.current.outputs.current }}
        run: |
          if [ "$CURRENT" = "$RUNTIME" ]; then
            echo "already pinned"
            exit 0
          fi

          BRANCH="update/nmdc-schema-${RUNTIME}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"

          if grep -qE '^nmdc-schema' requirements.txt; then
            sed -E "s/^nmdc-schema.*/nmdc-schema==${RUNTIME}/" -i requirements.txt
          else
            echo "nmdc-schema==${RUNTIME}" >> requirements.txt
          fi

          python3 - <<'PY'
          import os
          from pathlib import Path
          import re

          current_runtime = [int(part) for part in os.environ["CURRENT"].split(".")]
          next_runtime = [int(part) for part in os.environ["RUNTIME"].split(".")]

          if len(current_runtime) != 3 or len(next_runtime) != 3:
              raise SystemExit("Expected three-part semantic versions for nmdc-schema")
          if next_runtime == current_runtime:
              raise SystemExit(0)
          if next_runtime < current_runtime:
              raise SystemExit("Refusing to derive a package version bump from a runtime downgrade")

          if next_runtime[0] != current_runtime[0]:
              bump_kind = "major"
          elif next_runtime[1] != current_runtime[1]:
              bump_kind = "minor"
          else:
              bump_kind = "patch"

          pyproject_path = Path("pyproject.toml")
          pyproject_text = pyproject_path.read_text()
          match = re.search(r'(?m)^version = "(\d+)\.(\d+)\.(\d+)"$', pyproject_text)
          if not match:
              raise SystemExit("Could not find project version in pyproject.toml")

          major, minor, patch = [int(group) for group in match.groups()]
          if bump_kind == "major":
              next_project_version = f"{major + 1}.0.0"
          elif bump_kind == "minor":
              next_project_version = f"{major}.{minor + 1}.0"
          else:
              next_project_version = f"{major}.{minor}.{patch + 1}"

          updated_text = (
              pyproject_text[:match.start()]
              + f'version = "{next_project_version}"'
              + pyproject_text[match.end():]
          )
          pyproject_path.write_text(updated_text)
          print(f"Project version bumped to {next_project_version} ({bump_kind})")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as github_output:
              github_output.write(f"project_version={next_project_version}\n")
          PY

          git add requirements.txt pyproject.toml
          if git commit -m "Pin nmdc-schema to ${RUNTIME} (sync with NMDC runtime)"; then
            git push --set-upstream origin "$BRANCH"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to commit; not pushing branch"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.pushed == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runtime = "${{ steps.runtime.outputs.runtime }}";
            const projectVersion = "${{ steps.changes.outputs.project_version }}";
            const branch = `update/nmdc-schema-${runtime}`;
            const { owner, repo } = context.repo;
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const base = repoData.default_branch;

            // Check for existing open PRs from the same branch
            const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${branch}`, state: 'open' });
            if (prs.data.length > 0) {
              console.log('PR already open for branch, skipping creation.');
              return;
            }

            const { data: createdPr } = await github.rest.pulls.create({
              owner,
              repo,
              title: `Pin nmdc-schema to ${runtime} (sync with NMDC runtime)`,
              head: branch,
              base,
              body: `This PR pins \`nmdc-schema\` to the NMDC runtime version ${runtime} so the project stays compatible with the deployed runtime. It also bumps the package version in \`pyproject.toml\` using the same semantic-version change type detected in the runtime update.\n\nAfter this is merged, create a \`v${projectVersion}\` tag and trigger a new release.\n\nDetected by the scheduled runtime-triggered dependency update workflow.`,
            });

            for (const username of ['kheal', 'bmeluch']) {
              try {
                await github.rest.pulls.requestReviewers({
                  owner,
                  repo,
                  pull_number: createdPr.number,
                  reviewers: [username],
                });
              } catch (reviewError) {
                console.warn(`Could not request review from ${username}: ${reviewError.message}`);
                try {
                  await github.rest.issues.addAssignees({
                    owner,
                    repo,
                    issue_number: createdPr.number,
                    assignees: [username],
                  });
                } catch (assignError) {
                  console.warn(`Could not assign ${username}: ${assignError.message}`);
                }
              }
            }
